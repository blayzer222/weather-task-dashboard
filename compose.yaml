services:
  mysql:
    image: mysql:8.4
    container_name: weather-task-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: weather_task_dashboard
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uappuser", "-papppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  
  mailhog:
    image: mailhog/mailhog
    container_name: weather-task-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build: ./weathertaskbackend
    container_name: weather-task-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/weather_task_dashboard?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}

  frontend:
    build: ./weather-dashboard
    container_name: weather-task-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "3000:80"

volumes:
  mysql_data: